<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Mochigo</title>
    <meta
      name="description"
      content="Mochigo is a JLPT vocabulary study app with quizzes, bookmarks, and spaced review."
    />
    <style>
      :root {
        color-scheme: light;
        --bg: #f6f1e8;
        --card: rgba(255, 252, 247, 0.88);
        --text: #2f2419;
        --muted: #6a5848;
        --line: rgba(92, 67, 42, 0.14);
        --accent: #d97b46;
        --accent-soft: #f7d8b8;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family:
          "Avenir Next",
          "Segoe UI",
          sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at top, rgba(255, 244, 221, 0.92), transparent 42%),
          linear-gradient(180deg, #fcf8f1 0%, var(--bg) 100%);
      }

      main {
        width: min(720px, calc(100% - 32px));
        margin: 0 auto;
        padding: 72px 0 48px;
      }

      .card {
        padding: 32px;
        border: 1px solid var(--line);
        border-radius: 28px;
        background: var(--card);
        box-shadow: 0 18px 60px rgba(89, 59, 32, 0.08);
        backdrop-filter: blur(14px);
      }

      .eyebrow {
        display: inline-block;
        margin-bottom: 16px;
        padding: 8px 12px;
        border-radius: 999px;
        background: var(--accent-soft);
        color: #8f4d25;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0 0 14px;
        font-size: clamp(32px, 7vw, 56px);
        line-height: 0.95;
      }

      p {
        margin: 0;
        color: var(--muted);
        font-size: 17px;
        line-height: 1.7;
      }

      .note {
        margin-top: 22px;
        padding-top: 22px;
        border-top: 1px solid var(--line);
        font-size: 14px;
      }

      a {
        color: var(--accent);
      }
    </style>
  </head>
  <body>
    <main>
      <section class="card">
        <div class="eyebrow">Mochigo</div>
        <h1>JLPT vocabulary, made a little softer.</h1>
        <p>
          Mochigo is a Japanese vocabulary study app focused on quick quiz loops,
          mistake review, bookmarks, and steady JLPT prep across N5 to N1.
        </p>
        <p class="note">
          This site is used for app verification and publishing support files such
          as <a href="./app-ads.txt">app-ads.txt</a>.
        </p>
      </section>
    </main>
  </body>
</html>
